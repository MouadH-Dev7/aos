services:
  - type: web
    name: auth-service
    env: python
    rootDir: services/auth-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_NAME
        value: "REPLACE_ME"
      - key: DB_USER
        value: "REPLACE_ME"
      - key: DB_PASSWORD
        value: "REPLACE_ME"
      - key: DB_HOST
        value: "REPLACE_ME"
      - key: DB_PORT
        value: "5432"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALG
        value: "HS256"
      - key: RABBITMQ_URL
        value: "REPLACE_ME"
      - key: USER_REGISTERED_QUEUE
        value: "user_registered"
      - key: ADMIN_ROLE_ID
        value: "4"
      - key: DB_SSLMODE
        value: "require"
      - key: DB_CONNECT_TIMEOUT
        value: "10"

