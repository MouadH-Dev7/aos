envVarGroups:
  - name: immo-dz-shared-django
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,http://localhost:5174,http://localhost:5175,https://web-bm0c.onrender.com,https://admin-ga8i.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "http://localhost:5173,http://localhost:5174,http://localhost:5175,https://web-bm0c.onrender.com,https://admin-ga8i.onrender.com,https://*.onrender.com"
      - key: DB_CONN_MAX_AGE
        value: "120"
      - key: GUNICORN_WORKERS
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "120"

services:
  - type: keyvalue
    name: immo-dz-cache
    plan: starter
    region: frankfurt
    ipAllowList: []

  - type: web
    runtime: docker
    name: immo-dz-auth
    plan: starter
    region: frankfurt
    rootDir: aos_projet/services/auth-service
    healthCheckPath: /health/
    autoDeployTrigger: commit
    envVars:
      - fromGroup: immo-dz-shared-django
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: USER_REGISTERED_QUEUE
        value: user_registered

  - type: web
    runtime: docker
    name: immo-dz-account
    plan: starter
    region: frankfurt
    rootDir: aos_projet/services/account-service
    healthCheckPath: /health/
    autoDeployTrigger: commit
    envVars:
      - fromGroup: immo-dz-shared-django
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        sync: false

  - type: web
    runtime: docker
    name: immo-dz-location
    plan: starter
    region: frankfurt
    rootDir: aos_projet/services/location-service
    healthCheckPath: /health/
    autoDeployTrigger: commit
    envVars:
      - fromGroup: immo-dz-shared-django
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: immo-dz-cache
          property: connectionString

  - type: web
    runtime: docker
    name: immo-dz-listing
    plan: starter
    region: frankfurt
    rootDir: aos_projet/services/listing-service
    healthCheckPath: /health/
    autoDeployTrigger: commit
    envVars:
      - fromGroup: immo-dz-shared-django
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: immo-dz-cache
          property: connectionString
      - key: AUTH_BASE_URLS
        value: https://auth-service-56qw.onrender.com

  - type: web
    runtime: docker
    name: immo-dz-admin-validation
    plan: starter
    region: frankfurt
    rootDir: aos_projet/services/admin-validation-service
    healthCheckPath: /health/
    autoDeployTrigger: commit
    envVars:
      - fromGroup: immo-dz-shared-django
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        sync: false
      - key: LISTING_BASE_URLS
        value: https://listing-service-9ma6.onrender.com
      - key: AUTH_BASE_URLS
        value: https://auth-service-56qw.onrender.com

  - type: worker
    runtime: docker
    name: immo-dz-notification-worker
    plan: starter
    region: frankfurt
    rootDir: aos_projet/services/notification-worker
    autoDeployTrigger: commit
    envVars:
      - key: RABBITMQ_URL
        sync: false
      - key: USER_REGISTERED_QUEUE
        value: user_registered
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: WORKER_RETRY_DELAY_SECONDS
        value: "5"
