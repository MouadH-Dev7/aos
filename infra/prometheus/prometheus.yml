global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "traefik"
    metrics_path: /metrics
    static_configs:
      - targets: ["traefik:8080"]

  - job_name: "services-health"
    metrics_path: /metrics/
    static_configs:
      - targets:
          - "auth-service:8000"
          - "account-service:8000"
          - "listing-service:8000"
          - "location-service:8000"
          - "admin-validation-service:8000"

  - job_name: "services-local"
    metrics_path: /metrics/
    static_configs:
      - targets:
          - "host.docker.internal:8001"
          - "host.docker.internal:8002"
          - "host.docker.internal:8004"
          - "host.docker.internal:8003"
          - "host.docker.internal:8005"
